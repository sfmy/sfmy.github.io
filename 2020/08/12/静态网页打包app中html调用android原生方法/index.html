><span class="line">import android.widget.Toast;</span><br><span class="line"></span><br><span class="line">import org.apache.cordova.*;</span><br><span class="line"></span><br><span class="line">public class MainActivity extends CordovaActivity</span><br><span class="line">&#123;</span><br><span class="line">    @Override</span><br><span class="line">    public void onCreate(Bundle savedInstanceState)</span><br><span class="line">    &#123;</span><br><span class="line">        super.onCreate(savedInstanceState);</span><br><span class="line"></span><br><span class="line">        // enable Cordova apps to be started in the background</span><br><span class="line">        Bundle extras = getIntent().getExtras();</span><br><span class="line">        if (extras != null &amp;&amp; extras.getBoolean(&quot;cdvStartInBackground&quot;, false)) &#123;</span><br><span class="line">            moveTaskToBack(true);</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        // Set by &lt;content src=&quot;index.html&quot; /&gt; in config.xml</span><br><span class="line">        loadUrl(launchUrl);</span><br><span class="line">        webCallAndroidSetting();</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    private void webCallAndroidSetting () &#123;</span><br><span class="line">        WebView webView = (WebView) appView.getView();</span><br><span class="line">        WebSettings webSettings = webView.getSettings();</span><br><span class="line">        webSettings.setJavaScriptEnabled(true);</span><br><span class="line">        webView.addJavascriptInterface(MainActivity.this, &quot;android&quot;);</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    @JavascriptInterface</span><br><span class="line">    public void showToast () &#123;</span><br><span class="line">        Context context = getApplicationContext();</span><br><span class="line">        CharSequence text = &quot;Hello toast!&quot;;</span><br><span class="line">        int duration = Toast.LENGTH_SHORT;</span><br><span class="line"></span><br><span class="line">        Toast toast = Toast.makeText(context, text, duration);</span><br><span class="line">        toast.show();</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
